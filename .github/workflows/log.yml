name: log-waze-feeds

# GitHub throttles frequent crons hard (a "*/10" schedule fired ~7x/day in
# practice). So each run is a ~2h40m loop sampling every 10 minutes, and the
# cron only needs to fire every 3 hours. Runs end before the next event, so
# nothing queues or gets cancelled.
on:
  schedule:
    - cron: "7 */3 * * *"
  workflow_dispatch:

concurrency:
  group: waze-log
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  log:
    runs-on: ubuntu-latest
    timeout-minutes: 200
    steps:
      - uses: actions/checkout@v5

      - name: Log every 10 minutes, push every 30
        env:
          TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
        run: |
          git config user.name "waze-logger-bot"
          git config user.email "actions@users.noreply.github.com"
          push_retry() {
            for t in 1 2 3; do
              if git push; then return 0; fi
              # CSVs merge with union (.gitattributes), so appends from a
              # concurrent run auto-resolve; abort+merge as last resort.
              git pull --rebase || { git rebase --abort 2>/dev/null || true; git pull --no-rebase --no-edit || true; }
            done
            git push
          }
          for i in $(seq 1 16); do
            python3 logger.py
            python3 tomtom_logger.py || true
            git add -A data raw
            if ! git diff --cached --quiet; then
              git commit -m "log $(date -u +'%Y-%m-%d %H:%M')Z"
            fi
            if [ $((i % 3)) -eq 0 ]; then push_retry || true; fi
            if [ "$i" -lt 16 ]; then sleep 600; fi
          done
          push_retry
