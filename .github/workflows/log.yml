name: log-waze-feeds

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: waze-log
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  log:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Run logger
        run: python3 logger.py

      - name: Commit and push
        run: |
          git config user.name "waze-logger-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A data raw
          if git diff --cached --quiet; then
            echo "nothing new"
            exit 0
          fi
          git commit -m "log $(date -u +'%Y-%m-%d %H:%M')Z"
          for i in 1 2 3; do
            if git push; then exit 0; fi
            git pull --rebase
          done
          git push
